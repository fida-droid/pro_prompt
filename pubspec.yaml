name: pro_prompt
description: A modern AI prompt library app with multi-language support and AdMob integration.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
     intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  google_mobile_ads: ^5.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  share_plus: ^9.0.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/data/
